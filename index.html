<!DOCTYPE html>
<html lang="pt-br">

<head>

<meta charset="UTF-8">
<title>Auditoria de Rubricas TCE</title>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

.container{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
background:white;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
display:flex;
gap:10px;
align-items:center;
}

button{
padding:10px 14px;
border-radius:6px;
border:0;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.progressBox{
margin-top:10px;
background:#ddd;
height:20px;
border-radius:6px;
overflow:hidden;
}

.progressBar{
height:100%;
width:0%;
background:#22c55e;
transition:width 0.2s;
}

.tabs{
display:flex;
gap:5px;
margin-top:20px;
}

.tabBtn{
padding:10px 15px;
background:#ddd;
border-radius:6px;
cursor:pointer;
}

.tabBtn.active{
background:#2563eb;
color:white;
}

.tab{
display:none;
background:white;
border:1px solid #ddd;
border-radius:10px;
padding:15px;
margin-top:10px;
}

.tab.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#fafafa;
}

.search{
margin-bottom:10px;
padding:8px;
width:300px;
border-radius:6px;
border:1px solid #ccc;
}

.stats{
margin-top:10px;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<header>

<select id="municipio" style="width:350px"></select>

<button onclick="carregar()">Carregar Rubricas</button>

</header>

<div class="progressBox">
<div id="progressBar" class="progressBar"></div>
</div>

<div class="stats" id="stats"></div>


<div class="tabs">

<div class="tabBtn active" onclick="openTab(event,'pref')">Prefeitura</div>
<div class="tabBtn" onclick="openTab(event,'cam')">Câmara</div>
<div class="tabBtn" onclick="openTab(event,'buscar')">Buscar Rubrica</div>

</div>


<div id="pref" class="tab active">

<h3>Códigos disponíveis (1000-1999)</h3>

<table>
<thead>
<tr><th>Código</th></tr>
</thead>
<tbody id="prefBody"></tbody>
</table>

</div>


<div id="cam" class="tab">

<h3>Códigos disponíveis (2000-2999)</h3>

<table>
<thead>
<tr><th>Código</th></tr>
</thead>
<tbody id="camBody"></tbody>
</table>

</div>


<div id="buscar" class="tab">

<input id="busca" class="search" placeholder="Buscar por código ou descrição">

<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
</tr>
</thead>
<tbody id="buscaBody"></tbody>
</table>

</div>

</div>


<script>

let rubricas=[]

function openTab(evt,id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")
evt.target.classList.add("active")

}

const MUNICIPIOS = [
["FORTALEZA","057"],
["CAUCAIA","043"],
["MARANGUAPE","100"],
["SOBRAL","162"]
]

const select=document.getElementById("municipio")

MUNICIPIOS
.sort((a,b)=>a[0].localeCompare(b[0]))
.forEach(([nome,codigo])=>{

const opt=document.createElement("option")
opt.value=codigo
opt.textContent=`${codigo} - ${nome}`
select.appendChild(opt)

})

$(document).ready(function(){

$('#municipio').select2({
placeholder:"Digite o município"
})

})

async function carregar(){

rubricas=[]

const municipio=document.getElementById("municipio").value

const primeira = await fetch(`/api/proxy?codigo_municipio=${municipio}&quantidade=100&deslocamento=0`)
const j = await primeira.json()

const total = j.data.total
const paginas = Math.ceil(total/100)

rubricas.push(...j.data.data)

let carregadas=1

const progress=document.getElementById("progressBar")

progress.style.width=(carregadas/paginas*100)+"%"

const promisses=[]

for(let i=1;i<paginas;i++){

const deslocamento=i*100

promisses.push(

fetch(`/api/proxy?codigo_municipio=${municipio}&quantidade=100&deslocamento=${deslocamento}`)
.then(r=>r.json())
.then(d=>{

rubricas.push(...d.data.data)

carregadas++

progress.style.width=(carregadas/paginas*100)+"%"

})

)

}

await Promise.all(promisses)

processar()

}

function processar(){

const codigos = new Set()

rubricas.forEach(r=>{

const c=parseInt(r.codigo_item)

if(!isNaN(c)) codigos.add(c)

})

const pref=[]
const cam=[]

for(let i=1000;i<=1999;i++){
if(!codigos.has(i)) pref.push(i)
}

for(let i=2000;i<=2999;i++){
if(!codigos.has(i)) cam.push(i)
}

const prefBody=document.getElementById("prefBody")
const camBody=document.getElementById("camBody")

prefBody.innerHTML=""
camBody.innerHTML=""

pref.forEach(c=>{
const tr=document.createElement("tr")
tr.innerHTML=`<td>${c}</td>`
prefBody.appendChild(tr)
})

cam.forEach(c=>{
const tr=document.createElement("tr")
tr.innerHTML=`<td>${c}</td>`
camBody.appendChild(tr)
})

document.getElementById("stats").innerHTML=
`
Rubricas carregadas: ${rubricas.length}
<br>
Códigos disponíveis prefeitura: ${pref.length}
<br>
Códigos disponíveis câmara: ${cam.length}
`

}

document.getElementById("busca").addEventListener("input",()=>{

const q=document.getElementById("busca").value.toLowerCase()

const res=rubricas.filter(r=>{

const cod=(r.codigo_item||"").toString()
const desc=(r.descricao_item||"").toLowerCase()

return cod.includes(q)||desc.includes(q)

})

const tbody=document.getElementById("buscaBody")

tbody.innerHTML=""

res.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.codigo_item||""}</td>
<td>${r.descricao_item||""}</td>
`

tbody.appendChild(tr)

})

})

</script>

</body>
</html>
