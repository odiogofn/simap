<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Auditor de Rubricas - TCE CE</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f4f4f4;
}

h1{
margin-bottom:10px;
}

button,select,input{
padding:8px;
margin:5px;
}

.tabs button{
margin-right:5px;
}

.tab{
display:none;
margin-top:20px;
}

.tab.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

th{
background:#eee;
}

#barraBox{
width:100%;
height:20px;
background:#ddd;
margin-top:10px;
}

#barra{
height:100%;
width:0%;
background:#4caf50;
transition:width .3s;
}

</style>
</head>

<body>

<h1>Auditor de Rubricas TCE-CE</h1>

<select id="municipio"></select>

<button onclick="carregarMunicipio()">Carregar Município</button>
<button onclick="carregarTodos()">Carregar TODOS Municípios</button>

<div id="barraBox"><div id="barra"></div></div>
<div id="status"></div>

<div class="tabs">
<button onclick="abrirTab('pref')">Prefeitura livres</button>
<button onclick="abrirTab('cam')">Câmara livres</button>
<button onclick="abrirTab('busca')">Buscar</button>
<button onclick="abrirTab('compare')">Comparar</button>
</div>

<!-- PREFEITURA -->

<div id="pref" class="tab">

<h3>Códigos livres Prefeitura (1000-1999)</h3>

<table>
<thead><tr><th>Código</th></tr></thead>
<tbody id="prefBody"></tbody>
</table>

</div>

<!-- CAMARA -->

<div id="cam" class="tab">

<h3>Códigos livres Câmara (2000-2999)</h3>

<table>
<thead><tr><th>Código</th></tr></thead>
<tbody id="camBody"></tbody>
</table>

</div>

<!-- BUSCA -->

<div id="busca" class="tab">

<input id="campoBusca" placeholder="Buscar código ou descrição">

<table>
<thead>
<tr>
<th>Município</th>
<th>Código</th>
<th>Descrição</th>
</tr>
</thead>

<tbody id="buscaBody"></tbody>

</table>

</div>

<!-- COMPARAÇÃO -->

<div id="compare" class="tab">

<input id="codigoCompare" placeholder="Código ex: 1001">

<button onclick="comparar()">Comparar</button>

<table>

<thead>
<tr>
<th>Município</th>
<th>Descrição</th>
</tr>
</thead>

<tbody id="compareBody"></tbody>

</table>

</div>

]

const sel=document.getElementById("municipio")

MUNICIPIOS.forEach(m=>{
const o=document.createElement("option")
o.value=m[1]
o.textContent=m[0]
sel.appendChild(o)
})

let banco={}

async function carregarMunicipio(){

const cod=sel.value

const rubricas=await consultar(cod)

banco[cod]=rubricas

status.innerText="Município carregado: "+rubricas.length+" rubricas"

calcularLivres(rubricas)

}

async function consultar(cod){

let lista=[]

for(let d=0;d<=1000;d+=100){

const url=`${API_BASE}?codigo_municipio=${cod}&quantidade=100&deslocamento=${d}`

const resp=await fetch(url)

const json=await resp.json()

const dados=json.data.data

lista.push(...dados)

if(lista.length>=json.data.total) break

}

return lista

}

function calcularLivres(rubricas){

const set=new Set()

rubricas.forEach(r=>set.add(r.codigo_item))

const pref=document.getElementById("prefBody")
const cam=document.getElementById("camBody")

pref.innerHTML=""
cam.innerHTML=""

for(let i=1000;i<=1999;i++){

if(!set.has(i)) pref.innerHTML+=`<tr><td>${i}</td></tr>`

}

for(let i=2000;i<=2999;i++){

if(!set.has(i)) cam.innerHTML+=`<tr><td>${i}</td></tr>`

}

}

document.getElementById("campoBusca").addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

const body=document.getElementById("buscaBody")

body.innerHTML=""

Object.entries(banco).forEach(([cod,lista])=>{

const nome=MUNICIPIOS.find(m=>m[1]==cod)[0]

lista.filter(r=>{

return r.codigo_item.toString().includes(q) ||
(r.descricao_item||"").toLowerCase().includes(q)

}).forEach(r=>{

body.innerHTML+=`
<tr>
<td>${nome}</td>
<td>${r.codigo_item}</td>
<td>${r.descricao_item}</td>
</tr>
`

})

})

})

function comparar(){

const cod=document.getElementById("codigoCompare").value

const body=document.getElementById("compareBody")

body.innerHTML=""

Object.entries(banco).forEach(([c,lista])=>{

const nome=MUNICIPIOS.find(m=>m[1]==c)[0]

const r=lista.find(x=>x.codigo_item==cod)

if(r){

body.innerHTML+=`
<tr>
<td>${nome}</td>
<td>${r.descricao_item}</td>
</tr>
`

}

})

}

function abrirTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
