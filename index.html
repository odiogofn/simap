<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta de Rubricas</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:20px;
}

h1{
margin-bottom:10px;
}

button{
padding:10px;
margin-right:5px;
cursor:pointer;
}

.tab{
display:none;
margin-top:20px;
}

.tab.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:8px;
text-align:left;
}

th{
background:#eee;
}

#barraContainer{
width:100%;
height:20px;
background:#ddd;
margin-top:10px;
}

#barra{
height:100%;
width:0%;
background:#4caf50;
transition:width .3s;
}

input{
padding:8px;
width:300px;
margin-bottom:10px;
}

</style>
</head>

<body>

<h1>Consulta de Rubricas</h1>

<button onclick="carregar()">Carregar Rubricas</button>

<div id="barraContainer">
<div id="barra"></div>
</div>

<div id="status"></div>

<br>

<button onclick="abrirTab('prefeitura')">Prefeitura</button>
<button onclick="abrirTab('camara')">Câmara</button>
<button onclick="abrirTab('buscar')">Buscar Rubrica</button>

<!-- PREFEITURA -->

<div id="prefeitura" class="tab">

<h2>Códigos disponíveis Prefeitura (1000-1999)</h2>

<table>
<thead>
<tr>
<th>Código</th>
</tr>
</thead>

<tbody id="prefBody"></tbody>

</table>

</div>

<!-- CAMARA -->

<div id="camara" class="tab">

<h2>Códigos disponíveis Câmara (2000-2999)</h2>

<table>
<thead>
<tr>
<th>Código</th>
</tr>
</thead>

<tbody id="camBody"></tbody>

</table>

</div>

<!-- BUSCA -->

<div id="buscar" class="tab">

<h2>Buscar Rubrica</h2>

<input id="busca" placeholder="Digite código ou descrição">

<table>

<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
</tr>
</thead>

<tbody id="buscaBody"></tbody>

</table>

</div>

<script>

let rubricas=[]

function abrirTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

async function carregar(){

const barra=document.getElementById("barra")
const status=document.getElementById("status")

barra.style.width="10%"
status.innerText="Consultando proxy..."

try{

const resp=await fetch("proxy.js")

barra.style.width="40%"

const dados=await resp.json()

barra.style.width="70%"

rubricas=dados

processar()

barra.style.width="100%"

status.innerText="Rubricas carregadas: "+rubricas.length

}catch(e){

console.error(e)

status.innerText="Erro ao buscar rubricas"

}

}

function processar(){

const existentes=new Set()

rubricas.forEach(r=>{

const c=parseInt(r.codigo_item)

if(!isNaN(c)){
existentes.add(c)
}

})

const prefBody=document.getElementById("prefBody")
const camBody=document.getElementById("camBody")

prefBody.innerHTML=""
camBody.innerHTML=""

for(let i=1000;i<=1999;i++){

if(!existentes.has(i)){

const tr=document.createElement("tr")
tr.innerHTML=`<td>${i}</td>`

prefBody.appendChild(tr)

}

}

for(let i=2000;i<=2999;i++){

if(!existentes.has(i)){

const tr=document.createElement("tr")
tr.innerHTML=`<td>${i}</td>`

camBody.appendChild(tr)

}

}

}

document.getElementById("busca").addEventListener("input",()=>{

const q=document.getElementById("busca").value.toLowerCase()

const tbody=document.getElementById("buscaBody")

tbody.innerHTML=""

rubricas
.filter(r=>{

const codigo=(r.codigo_item||"").toString()
const desc=(r.descricao_item||"").toLowerCase()

return codigo.includes(q) || desc.includes(q)

})
.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.codigo_item||""}</td>
<td>${r.descricao_item||""}</td>
`

tbody.appendChild(tr)

})

})

</script>

</body>
</html>
