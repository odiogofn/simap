<!doctype html>
<html lang="pt-BR">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<title>SIMAP — Itens Remuneratórios</title>

<style>

body{
font-family:system-ui;
background:#f7f8fc;
margin:0;
}

.wrap{
max-width:1200px;
margin:auto;
padding:20px;
}

header{
background:#fff;
padding:15px;
border-radius:12px;
border:1px solid #ddd;
display:flex;
gap:10px;
flex-wrap:wrap;
}

.field{
display:flex;
flex-direction:column;
}

input,select{
padding:8px;
border-radius:6px;
border:1px solid #ccc;
}

button{
padding:10px 14px;
border:0;
border-radius:8px;
cursor:pointer;
font-weight:bold;
}

.btnPrimary{
background:#2563eb;
color:white;
}

.card{
margin-top:15px;
background:#fff;
border:1px solid #ddd;
border-radius:12px;
padding:10px;
}

.tableWrap{
max-height:450px;
overflow:auto;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#fafafa;
position:sticky;
top:0;
}

.log{
margin-top:10px;
background:#fff;
border:1px solid #ddd;
padding:10px;
border-radius:8px;
}

.ok{color:green}
.bad{color:red}

</style>
</head>

<body>

<div class="wrap">

<header>

<div class="field">
<label>Município</label>
<select id="municipioSelect"></select>
</div>

<button id="btnCarregar" class="btnPrimary">
Carregar
</button>

</header>

<div id="log" class="log"></div>

<div class="card">

<h3>Prefeitura (1000-1999)</h3>

<div class="tableWrap">
<table id="prefTable"></table>
</div>

</div>

<div class="card">

<h3>Câmara (2000-2999)</h3>

<div class="tableWrap">
<table id="camTable"></table>
</div>

</div>

<div class="card">

<h3>Códigos Vazios</h3>

<div class="tableWrap">
<table id="vazioTable"></table>
</div>

</div>

</div>

<script>

const log = $("log")

function loadMunicipios(){

for(const [nome,cod] of MUNICIPIOS){

const opt=document.createElement("option")
opt.value=cod
opt.textContent=nome

$("municipioSelect").appendChild(opt)

}

}

loadMunicipios()

function digitsOnly(v){

return (v??"").toString().replace(/\D/g,"")

}

function range(a,b){

const r=[]

for(let i=a;i<=b;i++) r.push(i)

return r

}

function render(table,data){

table.innerHTML=""

const thead=document.createElement("thead")
thead.innerHTML="<tr><th>codigo_item</th><th>descricao</th></tr>"

table.appendChild(thead)

const tbody=document.createElement("tbody")

for(const r of data){

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.codigo_item??""}</td>
<td>${r.descricao_item??""}</td>
`

tbody.appendChild(tr)

}

table.appendChild(tbody)

}

async function fetchPagina(municipio,deslocamento){

const url=`/api/proxy?codigo_municipio=${municipio}&quantidade=100&deslocamento=${deslocamento}`

const r=await fetch(url)

const j=await r.json()

return j?.data?.data || []

}

async function carregar(){

log.innerHTML=""

const municipio=$("municipioSelect").value

addLog("Carregando...")

let deslocamento=0
let rows=[]

while(true){

const promisses=[]

for(let i=0;i<4;i++){

promisses.push(fetchPagina(municipio,deslocamento))

deslocamento+=100

}

const pages=await Promise.all(promisses)

let total=0

for(const p of pages){

rows.push(...p)

total+=p.length

}

addLog("Registros: "+rows.length)

if(total<400) break

}

addLog("Total final: "+rows.length)

analisar(rows)

}

function analisar(rows){

const pref=[]
const cam=[]
const vazios=[]

for(const r of rows){

const d=digitsOnly(r.codigo_item)

if(!d){

vazios.push(r)
continue

}

const n=parseInt(d)

if(n>=1000 && n<=1999) pref.push(n)

if(n>=2000 && n<=2999) cam.push(n)

}

const prefMissing=range(1000,1999).filter(x=>!pref.includes(x))
const camMissing=range(2000,2999).filter(x=>!cam.includes(x))

render(
$("prefTable"),
prefMissing.map(x=>({codigo_item:x}))
)

render(
$("camTable"),
camMissing.map(x=>({codigo_item:x}))
)

render(
$("vazioTable"),
vazios
)

}

$("btnCarregar").onclick=carregar

</script>
