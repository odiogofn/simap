<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<title>SIM - Itens Remuneratórios</title>

<style>

body{
font-family:Arial;
background:#f4f4f4;
margin:30px;
}

h1{
margin-bottom:20px;
}

#topo{
display:flex;
gap:10px;
margin-bottom:20px;
}

input,select,button{
padding:8px;
font-size:14px;
}

button{
background:#2c7be5;
color:white;
border:none;
cursor:pointer;
}

button:hover{
background:#1a5fd0;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
background:white;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
font-size:13px;
}

th{
background:#eee;
}

#status{
margin-top:10px;
font-size:14px;
}

#faltantes{
margin-top:20px;
background:white;
padding:10px;
border:1px solid #ddd;
}

.codigoFaltante{
display:inline-block;
padding:3px 6px;
margin:2px;
background:#ffdddd;
border:1px solid #ff9999;
font-size:12px;
}

</style>

</head>

<body>

<h1>Consulta Itens Remuneratórios</h1>

<div id="topo">

<select id="municipio"></select>

<button onclick="consultar()">Consultar</button>

<input id="busca" placeholder="buscar código ou descrição">

</div>

<div id="status"></div>

<table>

<thead>

<tr>
<th>Código</th>
<th>Descrição</th>
<th>Tipo</th>
</tr>

</thead>

<tbody id="tabela"></tbody>

</table>

<h3>Códigos ausentes</h3>

<div id="faltantes"></div>

<script>

const MUNICIPIOS=[
["FORTALEZA","057"],
["CAUCAIA","043"],
["MARANGUAPE","100"]
];

const select=document.getElementById("municipio");

for(const m of MUNICIPIOS){

const opt=document.createElement("option");

opt.value=m[1];

opt.textContent=m[0];

select.appendChild(opt);

}

let dados=[];

async function consultar(){

dados=[];

let deslocamento=0;

const municipio=select.value;

document.getElementById("status").innerText="Consultando API...";

while(true){

const url=`/api/proxy?codigo_municipio=${municipio}&quantidade=100&deslocamento=${deslocamento}`;

const r=await fetch(url);

const json=await r.json();

if(!json.data || !json.data.data || json.data.data.length===0) break;

dados.push(...json.data.data);

deslocamento+=100;

}

document.getElementById("status").innerText=dados.length+" registros carregados";

renderTabela(dados);

calcularAusentes();

}

function renderTabela(lista){

const tbody=document.getElementById("tabela");

tbody.innerHTML="";

for(const item of lista){

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${item.codigo_item}</td>
<td>${item.descricao_item}</td>
<td>${item.tipo_item}</td>
`;

tbody.appendChild(tr);

}

}

document.getElementById("busca").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

const filtrados=dados.filter(i=>

String(i.codigo_item).includes(q) ||

i.descricao_item.toLowerCase().includes(q)

);

renderTabela(filtrados);

});

function calcularAusentes(){

const usados=dados.map(i=>i.codigo_item);

const faltantesDiv=document.getElementById("faltantes");

faltantesDiv.innerHTML="";

function verificarFaixa(inicio,fim){

for(let i=inicio;i<=fim;i++){

if(!usados.includes(i)){

const span=document.createElement("span");

span.className="codigoFaltante";

span.textContent=i;

faltantesDiv.appendChild(span);

}

}

}

verificarFaixa(1000,1999); // prefeitura

verificarFaixa(2000,2999); // camara

}

</script>

</body>
</html>
