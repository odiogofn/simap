<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Consulta Itens Remuneratórios</title>

<style>

body{
font-family:Arial;
background:#f5f5f5;
margin:40px;
}

.container{
max-width:1100px;
margin:auto;
background:white;
padding:20px;
border-radius:8px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h1{
margin-bottom:20px;
}

.controls{
display:flex;
gap:10px;
flex-wrap:wrap;
margin-bottom:20px;
}

input,select,button{
padding:8px;
font-size:14px;
}

button{
cursor:pointer;
background:#1976d2;
border:none;
color:white;
border-radius:4px;
}

button:hover{
background:#125ea5;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
padding:6px;
border-bottom:1px solid #ddd;
font-size:13px;
}

th{
background:#eee;
text-align:left;
}

.missing{
background:#ffdddd;
}

#status{
margin-top:10px;
font-size:14px;
}

</style>
</head>

<body>

<div class="container">

<h1>Consulta Itens Remuneratórios</h1>

<div class="controls">

<input id="municipioBusca" placeholder="buscar município">

<select id="municipio"></select>

<button onclick="consultar()">Consultar</button>

<input id="buscaTempoReal" placeholder="buscar código ou descrição">

</div>

<div id="status"></div>

<table id="tabela">
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
<th>Tipo</th>
</tr>
</thead>
<tbody></tbody>
</table>

<h3>Códigos Ausentes</h3>
<div id="faltantes"></div>

</div>

const municipioSelect=document.getElementById("municipio");

function renderMunicipios(lista){
municipioSelect.innerHTML="";
for(const m of lista){
const opt=document.createElement("option");
opt.value=m[1];
opt.textContent=m[0]+" ("+m[1]+")";
municipioSelect.appendChild(opt);
}
}

renderMunicipios(MUNICIPIOS);

document.getElementById("municipioBusca").addEventListener("input",e=>{
const q=e.target.value.toUpperCase();
renderMunicipios(MUNICIPIOS.filter(m=>m[0].includes(q)));
});

let dados=[];

async function consultar(){

dados=[];
const municipio=municipioSelect.value;
let deslocamento=0;

document.getElementById("status").innerText="Carregando...";

while(true){

const url=`/api/proxy?codigo_municipio=${municipio}&quantidade=100&deslocamento=${deslocamento}`;

const r=await fetch(url);
const json=await r.json();

if(!json.data || json.data.length===0) break;

dados.push(...json.data);

deslocamento+=100;

}

document.getElementById("status").innerText=`${dados.length} registros carregados`;

renderTabela(dados);
calcularFaltantes();

}

function renderTabela(lista){

const tbody=document.querySelector("#tabela tbody");
tbody.innerHTML="";

for(const item of lista){

const tr=document.createElement("tr");

tr.innerHTML=`
<td>${item.codigo_item}</td>
<td>${item.descricao_item}</td>
<td>${item.tipo_item}</td>
`;

tbody.appendChild(tr);

}

}

document.getElementById("buscaTempoReal").addEventListener("input",e=>{

const q=e.target.value.toLowerCase();

const filtrados=dados.filter(i=>
String(i.codigo_item).includes(q) ||
i.descricao_item.toLowerCase().includes(q)
);

renderTabela(filtrados);

});

function calcularFaltantes(){

const codigos=dados.map(i=>i.codigo_item).sort((a,b)=>a-b);

let faltantes=[];

for(let i=codigos[0];i<=codigos[codigos.length-1];i++){

if(!codigos.includes(i)) faltantes.push(i);

}

document.getElementById("faltantes").innerText=faltantes.join(", ");

}

</script>

</body>
</html>
