<!DOCTYPE html>
<html lang="pt-br">

<head>
<meta charset="UTF-8">
<title>Auditor de Rubricas TCE-CE</title>

<style>

body{
font-family:Arial;
margin:20px;
background:#f5f5f5;
}

h1{
margin-bottom:15px;
}

button,select,input{
padding:8px;
margin:5px;
}

.tabs button{
margin-right:5px;
}

.tab{
display:none;
margin-top:20px;
}

.tab.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
background:white;
}

th,td{
border:1px solid #ddd;
padding:6px;
}

th{
background:#eee;
}

#barraBox{
width:100%;
height:20px;
background:#ddd;
margin-top:10px;
}

#barra{
height:100%;
width:0%;
background:#4caf50;
transition:width .3s;
}

</style>

</head>

<body>

<h1>Auditor de Rubricas - TCE CE</h1>

<select id="municipio"></select>

<button onclick="carregarMunicipio()">Carregar Município</button>
<button onclick="carregarTodos()">Carregar TODOS Municípios</button>

<div id="barraBox">
<div id="barra"></div>
</div>

<div id="status"></div>

<div class="tabs">
<button onclick="abrirTab('pref')">Prefeitura livres</button>
<button onclick="abrirTab('cam')">Câmara livres</button>
<button onclick="abrirTab('busca')">Buscar</button>
<button onclick="abrirTab('compare')">Comparar</button>
</div>

<!-- PREF -->

<div id="pref" class="tab">

<h3>Códigos livres Prefeitura (1000-1999)</h3>

<table>
<thead>
<tr><th>Código</th></tr>
</thead>

<tbody id="prefBody"></tbody>

</table>

</div>

<!-- CAMARA -->

<div id="cam" class="tab">

<h3>Códigos livres Câmara (2000-2999)</h3>

<table>
<thead>
<tr><th>Código</th></tr>
</thead>

<tbody id="camBody"></tbody>

</table>

</div>

<!-- BUSCA -->

<div id="busca" class="tab">

<input id="campoBusca" placeholder="Buscar código ou descrição">

<table>

<thead>
<tr>
<th>Município</th>
<th>Código</th>
<th>Descrição</th>
</tr>
</thead>

<tbody id="buscaBody"></tbody>

</table>

</div>

<!-- COMPARAÇÃO -->

<div id="compare" class="tab">

<input id="codigoCompare" placeholder="Código ex: 1001">

<button onclick="comparar()">Comparar</button>

<table>

<thead>
<tr>
<th>Município</th>
<th>Descrição</th>
</tr>
</thead>

<tbody id="compareBody"></tbody>

</table>

</div>

<script>

const API="/api/proxy"

const MUNICIPIOS=[
["ABAIARA","002"],["ACARAPE","003"],["ACARAU","004"],["ACOPIARA","005"],
["AIUABA","006"],["ALCANTARAS","007"],["ALTANEIRA","008"],["ALTO SANTO","009"],
["AMONTADA","010"],["ANTONINA DO NORTE","011"],["APUIARES","012"],
["AQUIRAZ","013"],["ARACATI","014"],["ARACOIABA","015"],["ARARIPE","016"],
["ARATUBA","017"],["ARNEIROZ","018"],["ASSARE","019"],["AURORA","020"],
["BAIXIO","021"],["BANABUIU","022"],["BARBALHA","023"],["BARREIRA","024"],
["BARRO","025"],["BARROQUINHA","026"],["BATURITE","027"],["BEBERIBE","028"],
["BELA CRUZ","029"],["BOA VIAGEM","030"],["BREJO SANTO","031"],
["CAMOCIM","032"],["CAMPOS SALES","033"],["CANINDE","034"],["CAPISTRANO","035"],
["CARIDADE","036"],["CARIRE","037"],["CARIRIACU","038"],["CARIUS","039"],
["CARNAUBAL","040"],["CASCAVEL","041"],["CATARINA","042"],["CAUCAIA","043"],
["CEDRO","044"],["CHAVAL","045"],["CHOROZINHO","046"],["COREAU","047"],
["CRATEUS","048"],["CRATO","049"],["CROATA","050"],["CRUZ","051"],
["DEPUTADO IRAPUAN PINHEIRO","052"],["ERERE","053"],["EUSEBIO","054"],
["FARIAS BRITO","055"],["FORQUILHA","056"],["FORTALEZA","057"]
]

const sel=document.getElementById("municipio")

MUNICIPIOS.forEach(m=>{

const op=document.createElement("option")
op.value=m[1]
op.textContent=m[0]
sel.appendChild(op)

})

let banco={}

async function carregarMunicipio(){

const cod=sel.value

status.innerText="Carregando..."

const resp=await fetch(`${API}?codigo_municipio=${cod}`)

const dados=await resp.json()

banco[cod]=dados

status.innerText=`${dados.length} rubricas carregadas`

calcularLivres(dados)

}

function calcularLivres(rubricas){

const usados=new Set()

rubricas.forEach(r=>usados.add(r.codigo_item))

prefBody.innerHTML=""
camBody.innerHTML=""

for(let i=1000;i<=1999;i++){

if(!usados.has(i)){
prefBody.innerHTML+=`<tr><td>${i}</td></tr>`
}

}

for(let i=2000;i<=2999;i++){

if(!usados.has(i)){
camBody.innerHTML+=`<tr><td>${i}</td></tr>`
}

}

}

campoBusca.addEventListener("input",e=>{

const q=e.target.value.toLowerCase()

buscaBody.innerHTML=""

Object.entries(banco).forEach(([cod,lista])=>{

const nome=MUNICIPIOS.find(m=>m[1]==cod)[0]

lista.filter(r=>

r.codigo_item.toString().includes(q) ||
(r.descricao_item||"").toLowerCase().includes(q)

).forEach(r=>{

buscaBody.innerHTML+=`
<tr>
<td>${nome}</td>
<td>${r.codigo_item}</td>
<td>${r.descricao_item}</td>
</tr>`

})

})

})

function comparar(){

const cod=codigoCompare.value

compareBody.innerHTML=""

Object.entries(banco).forEach(([c,lista])=>{

const nome=MUNICIPIOS.find(m=>m[1]==c)[0]

const r=lista.find(x=>x.codigo_item==cod)

if(r){

compareBody.innerHTML+=`
<tr>
<td>${nome}</td>
<td>${r.descricao_item}</td>
</tr>`

}

})

}

function abrirTab(id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))

document.getElementById(id).classList.add("active")

}

</script>

</body>
</html>
