<!DOCTYPE html>
<html lang="pt-br">
<head>

<link href="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/css/select2.min.css" rel="stylesheet"/>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script src="https://cdn.jsdelivr.net/npm/select2@4.1.0-rc.0/dist/js/select2.min.js"></script>

<style>

body{
font-family:Arial;
background:#f5f6fa;
margin:0;
}

.container{
max-width:1100px;
margin:auto;
padding:20px;
}

header{
background:white;
padding:15px;
border-radius:10px;
border:1px solid #ddd;
display:flex;
gap:10px;
align-items:center;
}

button{
padding:10px 14px;
border-radius:6px;
border:0;
background:#2563eb;
color:white;
font-weight:bold;
cursor:pointer;
}

.tabs{
display:flex;
gap:5px;
margin-top:20px;
}

.tabBtn{
padding:10px 15px;
background:#ddd;
border-radius:6px;
cursor:pointer;
}

.tabBtn.active{
background:#2563eb;
color:white;
}

.tab{
display:none;
background:white;
border:1px solid #ddd;
border-radius:10px;
padding:15px;
margin-top:10px;
}

.tab.active{
display:block;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
padding:8px;
border-bottom:1px solid #eee;
font-size:13px;
}

th{
background:#fafafa;
}

.search{
margin-bottom:10px;
padding:8px;
width:300px;
border-radius:6px;
border:1px solid #ccc;
}

</style>

</head>

<body>

<div class="container">

<header>

<select id="municipio" style="width:350px"></select>

<button onclick="carregar()">Carregar</button>

</header>


<div class="tabs">

<div class="tabBtn active" onclick="openTab(event,'pref')">Prefeitura</div>
<div class="tabBtn" onclick="openTab(event,'cam')">Câmara</div>
<div class="tabBtn" onclick="openTab(event,'buscar')">Buscar Rubrica</div>

</div>


<div id="pref" class="tab active">

<h3>Códigos faltantes (1000-1999)</h3>

<table>
<thead>
<tr>
<th>Código</th>
</tr>
</thead>
<tbody id="prefBody"></tbody>
</table>

</div>


<div id="cam" class="tab">

<h3>Códigos faltantes (2000-2999)</h3>

<table>
<thead>
<tr>
<th>Código</th>
</tr>
</thead>
<tbody id="camBody"></tbody>
</table>

</div>


<div id="buscar" class="tab">

<h3>Buscar Rubrica</h3>

<input id="busca" class="search" placeholder="Digite código ou nome da rubrica">

<table>
<thead>
<tr>
<th>Código</th>
<th>Descrição</th>
</tr>
</thead>
<tbody id="buscaBody"></tbody>
</table>

</div>


</div>


<script>

let rubricas=[]

function openTab(evt,id){

document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"))
document.querySelectorAll(".tabBtn").forEach(b=>b.classList.remove("active"))

document.getElementById(id).classList.add("active")

evt.target.classList.add("active")

}

const select=document.getElementById("municipio")

MUNICIPIOS
.sort((a,b)=>a[0].localeCompare(b[0]))
.forEach(([nome,codigo])=>{

const opt=document.createElement("option")

opt.value=codigo
opt.textContent=`${codigo} - ${nome}`

select.appendChild(opt)

})

$(document).ready(function(){

$('#municipio').select2({
placeholder:"Digite o município"
})

})

function range(a,b){

let r=[]
for(let i=a;i<=b;i++) r.push(i)

return r

}

async function fetchPagina(municipio,deslocamento){

const url=`/api/proxy?codigo_municipio=${municipio}&quantidade=100&deslocamento=${deslocamento}`

const r=await fetch(url)
const j=await r.json()

return j?.data?.data || []

}

async function carregar(){

rubricas=[]

const municipio=document.getElementById("municipio").value

let deslocamento=0

while(true){

const reqs=[]

for(let i=0;i<5;i++){

reqs.push(fetchPagina(municipio,deslocamento))
deslocamento+=100

}

const pages=await Promise.all(reqs)

let total=0

pages.forEach(p=>{
rubricas.push(...p)
total+=p.length
})

if(total<500) break

}

processar()

}

function processar(){

let pref=[]
let cam=[]

rubricas.forEach(r=>{

const c=parseInt(r.codigo_item)

if(c>=1000 && c<=1999) pref.push(c)
if(c>=2000 && c<=2999) cam.push(c)

})

const prefMissing=range(1000,1999).filter(x=>!pref.includes(x))
const camMissing=range(2000,2999).filter(x=>!cam.includes(x))

const prefBody=document.getElementById("prefBody")
const camBody=document.getElementById("camBody")

prefBody.innerHTML=""
camBody.innerHTML=""

prefMissing.forEach(c=>{

const tr=document.createElement("tr")
tr.innerHTML=`<td>${c}</td>`
prefBody.appendChild(tr)

})

camMissing.forEach(c=>{

const tr=document.createElement("tr")
tr.innerHTML=`<td>${c}</td>`
camBody.appendChild(tr)

})

}

document.getElementById("busca").addEventListener("input",()=>{

const q=document.getElementById("busca").value.toLowerCase()

const res=rubricas.filter(r=>

r.codigo_item.toString().includes(q) ||
r.descricao_item.toLowerCase().includes(q)

)

const tbody=document.getElementById("buscaBody")

tbody.innerHTML=""

res.forEach(r=>{

const tr=document.createElement("tr")

tr.innerHTML=`
<td>${r.codigo_item}</td>
<td>${r.descricao_item}</td>
`

tbody.appendChild(tr)

})

})

</script>

</body>
</html>
