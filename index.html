<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>SIMAP — Itens Remuneratórios</title>
<meta name="viewport" content="width=device-width,initial-scale=1">

<style>

body{
font-family:Arial;
background:#f3f4f6;
margin:0;
padding:20px;
}

.wrap{
max-width:1200px;
margin:auto;
}

button{
padding:10px 14px;
border:0;
border-radius:6px;
cursor:pointer;
background:#2563eb;
color:#fff;
font-weight:bold;
}

input,select{
padding:10px;
border:1px solid #ccc;
border-radius:6px;
}

.tableWrap{
max-height:400px;
overflow:auto;
border:1px solid #ddd;
}

table{
width:100%;
border-collapse:collapse;
}

th,td{
border-bottom:1px solid #eee;
padding:6px;
font-size:13px;
}

th{
background:#fafafa;
position:sticky;
top:0;
}

</style>
</head>

<body>

<div class="wrap">

<h2>Itens Remuneratórios</h2>

<input id="municipioSearch" placeholder="Buscar município">

<select id="municipioSelect"></select>

<button id="btnCarregar">Carregar</button>

<button id="btnBaixarRelatorio" disabled>Baixar TXT</button>

<hr>

<div id="log"></div>

<h3>Prefeitura (1000-1999)</h3>
<div class="tableWrap">
<table id="prefTable"></table>
</div>

<h3>Câmara (2000-2999)</h3>
<div class="tableWrap">
<table id="camTable"></table>
</div>

<h3>Vazios</h3>
<div class="tableWrap">
<table id="vazioTable"></table>
</div>

<h3>Pesquisar</h3>

<input id="searchInput" placeholder="ex: INSS">
<input id="searchLimit" type="number" value="300">

<table id="searchTable"></table>

</div>

<script>

const municipioSelect = document.getElementById("municipioSelect");
const municipioSearch = document.getElementById("municipioSearch");

function renderMunicipios(list){
municipioSelect.innerHTML="";
for(const [nome,cod] of list){
const o=document.createElement("option");
o.value=cod;
o.textContent=nome+" ("+cod+")";
municipioSelect.appendChild(o);
}
}

renderMunicipios(MUNICIPIOS);

municipioSearch.addEventListener("input",()=>{
const q=municipioSearch.value.toUpperCase();
const f=MUNICIPIOS.filter(m=>m[0].includes(q));
renderMunicipios(f);
});

let rowsCache=[];

function digitsOnly(s){
return (s||"").toString().replace(/\D+/g,"");
}

function expected(from,to){
let a=[];
for(let i=from;i<=to;i++)a.push(i);
return a;
}

function analyze(rows){

let pref=new Set();
let cam=new Set();
let vazios=[];

for(const r of rows){

let raw=r.codigo_item;
let d=digitsOnly(raw);

if(!d){
vazios.push(r);
continue;
}

let n=Number(d);

if(n>=1000 && n<=1999)pref.add(n);
if(n>=2000 && n<=2999)cam.add(n);

}

return{
prefMissing:expected(1000,1999).filter(n=>!pref.has(n)),
camMissing:expected(2000,2999).filter(n=>!cam.has(n)),
vazios
};

}

function renderMissing(el,list){

el.innerHTML=
"<tr><th>codigo</th></tr>"+
list.map(v=>"<tr><td>"+v+"</td></tr>").join("");

}

function renderRows(el,rows){

if(!rows.length){
el.innerHTML="<tr><td>Sem dados</td></tr>";
return;
}

let cols=Object.keys(rows[0]);

el.innerHTML=
"<tr>"+cols.map(c=>"<th>"+c+"</th>").join("")+"</tr>"+
rows.slice(0,300).map(r=>
"<tr>"+cols.map(c=>"<td>"+(r[c]??"")+"</td>").join("")+"</tr>"
).join("");

}

async function carregar(){

const municipio=municipioSelect.value;

const url="/api/proxy?codigo_municipio="+municipio;

document.getElementById("log").innerText="Consultando API...";

const resp=await fetch(url);

const rows=await resp.json();

rowsCache=rows;

document.getElementById("log").innerText="Registros: "+rows.length;

const r=analyze(rows);

renderMissing(document.getElementById("prefTable"),r.prefMissing);
renderMissing(document.getElementById("camTable"),r.camMissing);
renderRows(document.getElementById("vazioTable"),r.vazios);

}

document.getElementById("btnCarregar").onclick=carregar;

document.getElementById("searchInput").addEventListener("input",()=>{

let q=document.getElementById("searchInput").value.toLowerCase();

let limit=parseInt(document.getElementById("searchLimit").value||300);

let hits=[];

for(const r of rowsCache){

if(JSON.stringify(r).toLowerCase().includes(q)){
hits.push(r);
if(hits.length>=limit)break;
}

}

renderRows(document.getElementById("searchTable"),hits);

});

</script>

</body>
</html>
